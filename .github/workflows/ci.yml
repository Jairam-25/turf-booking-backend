name: Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Clean solution
        run: dotnet clean TurfBooking.sln

      - name: Restore packages
        run: dotnet restore TurfBooking.sln

      # If LoadBalancer project is not included in the solution, restore it explicitly
      - name: Restore LoadBalancer project
        run: dotnet restore TurfBooking.LoadBalancer/TurfBooking.LoadBalancer.csproj

      - name: Build
        run: dotnet build TurfBooking.sln --no-restore -c Release

      - name: Run Unit Tests
        run: dotnet test TurfBooking.sln --no-build -c Release --logger "trx;LogFileName=results.xml"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/results.xml'
          reporter: dotnet-trx

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -f TurfBooking.API/Dockerfile -t turfbooking-api TurfBooking.API
